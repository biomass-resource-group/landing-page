name: Dependency Review

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Detect dependency graph support
        id: dependency-graph
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          status="$(
            gh api "repos/${{ github.repository }}" \
              --jq '.security_and_analysis.dependency_graph.status // "disabled"'
          )"
          echo "status=$status" >> "$GITHUB_OUTPUT"

      - if: github.event_name == 'pull_request' && steps.dependency-graph.outputs.status == 'enabled'
        uses: actions/dependency-review-action@v4

      - if: github.event_name == 'pull_request' && steps.dependency-graph.outputs.status != 'enabled'
        run: echo "Skipping dependency review because GitHub Dependency Graph is not enabled for this repository."

      - if: github.event_name != 'pull_request'
        run: echo "Skipping dependency review because this workflow only evaluates pull request dependency diffs."
