name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: npm

      - run: npm ci
      - run: npm run check
      - run: npm run build
      - run: npm run validate:dist
      - name: Lighthouse smoke check
        run: |
          npx --yes serve@14 dist -l 4173 >/tmp/brg-serve.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          npx --yes wait-on http://127.0.0.1:4173
          npx --yes lighthouse@13 http://127.0.0.1:4173/ \
            --only-categories=performance,accessibility,best-practices,seo \
            --chrome-flags='--headless=new --no-sandbox' \
            --quiet \
            --output=json \
            --output-path=/tmp/brg-lighthouse.json
          node - <<'NODE'
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('/tmp/brg-lighthouse.json', 'utf8'));
          const thresholds = {
            performance: 0.9,
            accessibility: 1,
            'best-practices': 1,
            seo: 1,
          };

          for (const [category, minimum] of Object.entries(thresholds)) {
            const actual = report.categories[category].score;
            if (actual < minimum) {
              console.error(`${category} score ${actual} is below ${minimum}`);
              process.exit(1);
            }
          }

          console.log('Lighthouse thresholds passed.');
          NODE
