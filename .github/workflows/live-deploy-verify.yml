name: Live Deploy Verify

on:
  workflow_dispatch:
  schedule:
    - cron: '17 14 * * *'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22.12.0

      - run: node ./scripts/validate-live-deploy.mjs
